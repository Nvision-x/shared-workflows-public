name: CalVer Release

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        type: string
        default: "ubuntu-latest"
      create_release:
        description: 'Create git tag and GitHub Release'
        type: boolean
        default: true

jobs:
  release:
    name: Create Release
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: new_version
        run: |
          TODAY=$(date +%Y.%m.%d)
          DATE_PREFIX="v${TODAY}"

          echo "Today's date prefix: $DATE_PREFIX"

          LATEST_TODAY_TAG=$(git tag -l "${DATE_PREFIX}-*" | sort -t- -k2 -n | tail -1)

          if [ -z "$LATEST_TODAY_TAG" ]; then
            BUILD_NUM=1
          else
            CURRENT_BUILD=$(echo "$LATEST_TODAY_TAG" | sed "s/${DATE_PREFIX}-//")
            BUILD_NUM=$((CURRENT_BUILD + 1))
          fi

          NEW_VERSION="${DATE_PREFIX}-${BUILD_NUM}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Get previous tag for changelog
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi

          echo "$CHANGELOG" > /tmp/changelog.txt

          echo "Changelog:"
          echo "$CHANGELOG"

      - name: Create and push tag
        if: inputs.create_release
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

          echo "Created and pushed tag: $NEW_VERSION"

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.new_version.outputs.new_version }}
          name: Release ${{ steps.new_version.outputs.new_version }}
          body_path: /tmp/changelog.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
